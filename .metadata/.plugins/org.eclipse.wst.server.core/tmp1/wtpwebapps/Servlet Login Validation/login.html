<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class='container'>
		<h2>Login</h2>
		<form action="validate" method="POST">
			<input type="text" name="name" class="control" placeholder="Username"
				required> <input type="password" name="pass" class="control"
				placeholder="Password" required> <input type="submit"
				value="Login" class="control">
		</form>
		<p>
			Don't have an account? <a href="signup.html">Sign Up</a>
		</p>
	</div>
</body>
</html>
